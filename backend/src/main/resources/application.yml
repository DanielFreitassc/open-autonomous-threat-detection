spring:
  application:
    name: backend
  datasource:
    url: jdbc:h2:mem:/db
    username: ${DB_USER:admin}
    password: ${DB_PASS:admin}
    
  jpa:
    hibernate:
      ddl-auto: update

api:
 security:
    token:
        secret: ${JWT_SECRET:my-secret-key}

user:
    mock:
        username: ${ADMIN_USERNAME:admin}
        password: ${ADMIN_PASSWORD:admin}

server:
    port: 8080