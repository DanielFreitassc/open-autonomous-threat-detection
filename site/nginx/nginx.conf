server {
    listen 80;
    server_name localhost;

    # CONFIGURAÇÃO DE LOG VIA SYSLOG (NATÍVO)
    # Envia para o rsyslog que depois encaminha para o SIEM/Log Server
    access_log syslog:server=172.25.0.50:5140,facility=local7,tag=nginx_access,severity=info;
    error_log  syslog:server=172.25.0.50:5140,facility=local7,tag=nginx_error;

    # Segurança: Oculta a versão do Nginx nos headers
    server_tokens off;

    # Compressão Gzip para melhor performance
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    location / {
        # Nome do serviço do container da aplicação (ex: 'app' no docker-compose)
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Headers para repassar o IP real do cliente
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache de assets estáticos do Next.js
    location /_next/static/ {
        proxy_pass http://app:3000;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}