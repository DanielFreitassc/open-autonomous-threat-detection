services:
  # ==========================================
  # 1. BANCO DE DADOS (PostgreSQL)
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: open_autonomous_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: db
    ports:
      - "5432:5432"
    volumes:
      - db:/var/lib/postgresql/data
    networks:
      - rede_monitoramento

  # ==========================================
  # 2. BACKEND (Spring Boot)
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: open_autonomous_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=admin
    depends_on:
      - postgres
    networks:
      - rede_monitoramento

  # ==========================================
  # 3. FRONTEND (Next.js)
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: open_autonomous_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Lembre-se: em produção, substitua este valor por /api/v1 para usar o Nginx
      - NEXT_PUBLIC_API_URL=/api/v1
      - NEXT_PUBLIC_AGENT_API_URL=/api/config
    depends_on:
      - backend
    networks:
      - rede_monitoramento

  # ==========================================
  # 4. AGENTE DE IA (Python)
  # ==========================================
  ia-csirt-agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: ia_monitor_agent
    # Modo Host: o container usa a interface de rede do servidor (Ubuntu)
    network_mode: host
    volumes:
      - ./agent:/app
    environment:
      - PYTHONUNBUFFERED=1
      # COMO ESTAMOS NO HOST, PRECISAMOS APONTAR PARA O LOCALHOST DA MÁQUINA
      # POIS O POSTGRES E O BACKEND ESTÃO MAPEADOS NAS PORTAS DO HOST (5432 e 8080)
      - DB_HOST=127.0.0.1
      - DB_PORT=5432
      - DB_NAME=db
      - DB_USER=admin
      - DB_PASSWORD=admin
      - API_ENDPOINT=http://127.0.0.1:8080/api/v1/events
      - ADMIN_PASSWORD=SuperSenha2026
    depends_on:
      - backend
      - postgres
    restart: unless-stopped

# ==========================================
# CONFIGURAÇÕES DE REDE E VOLUMES
# ==========================================
networks:
  rede_monitoramento:
    name: open-autonomous-threat-detection
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes:
  db:
    name: db